services:
  - type: web
    name: acadtrack-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false   # Set this in Render Dashboard → Environment
      - key: JWT_SECRET
        sync: false   # Set this in Render Dashboard → Environment
      - key: FRONTEND_URL
        sync: false   # Set to your Vercel deployment URL e.g. https://acadtrack.vercel.app
      - key: BREVO_USER
        sync: false
      - key: BREVO_SMTP_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: BREVO_SENDER_NAME
        value: AcadTrack
